<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!--<meta name=description content="This site was generated with Anima. www.animaapp.com"/>-->
    <!-- <link rel="shortcut icon" type=image/png href="https://animaproject.s3.amazonaws.com/home/favicon.png" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link rel="shortcut icon" type="image/png" href="https://animaproject.s3.amazonaws.com/home/favicon.png" />
    <meta name="og:type" content="website" />
    <meta name="twitter:card" content="photo" />
    <link rel="stylesheet" type="text/css" href="css/vertical.css" />
    <link rel="stylesheet" type="text/css" href="css/styleguide.css" />
    <link rel="stylesheet" type="text/css" href="css/globals.css" />
  </head>
  <body style="margin: 0; background: #2b2b2b">
    <input type="hidden" id="anPageName" name="page" value="vertical" />
    <div class="vertical screen">
      <div class="main">
        <div class="mian-div">
          <div class="section-graph section-1">
            <div class="div-graph div-1">
              <img class="graph" src="img/graph-1.svg" alt="Graph" />
              <div class="graph-ui">
                <img class="velocity-toggle" src="img/velocity-toggle-1.svg" alt="Velocity-toggle" />
                <div class="acceleration-toggle"><img class="a" src="img/a-1.svg" alt="A" /></div>
                <div class="x-button"><img class="maximize-2" src="img/maximize-2-1.svg" alt="Maximize 2" /></div>
                <div class="x-button"><img class="type" src="img/type-2.svg" alt="Type" /></div>
                <div class="x-button">
                  <div class="group-1">
                    <div class="rectangle-1 rectangle"></div>
                    <div class="rectangle-2 rectangle"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="section section-1">
            <div class="div div-1">
              <div class="e-button">
                <div class="icon-1 icon-4">
                  <div class="group"><img class="vector" src="img/vector-5.svg" alt="Vector" /></div>
                </div>
                <div class="analyze bouutn">Analyze</div>
              </div>
              <div class="apply-button apply-1">
                <div class="icon-2 icon-4"></div>
                <div class="apply apply-1 bouutn">Apply</div>
              </div>
              <div class="e-button">
                <div class="icon-3 icon-4"></div>
                <div class="save bouutn">Save</div>
              </div>
            </div>
          </div>
          <div class="section section-1">
            <div class="bar-resize"></div>
          </div>
          <div class="section-group section-1">
            <div class="div div-1">
              <div class="name-pulldown"></div>
              <div class="x-button-1"><img class="icon icon-4" src="img/icon-3.svg" alt="icon" /></div>
              <div class="x-button-1"><img class="icon icon-4" src="img/icon-4.svg" alt="icon" /></div>
              <div class="x-button-1"><img class="icon icon-4" src="img/icon-5.svg" alt="icon" /></div>
              <div class="card-size-slider">
                <img class="vector-1" src="img/vector-1-2.svg" alt="Vector 1" />
                <div class="ellipse-1"></div>
              </div>
            </div>
          </div>
          <div class="section section-1">
            <div class="div-preset div-1">
              <article class="dummy" src="img/dummy-7.svg" alt="Dummy" />
              <article class="dummy" src="img/dummy-8.svg" alt="Dummy" />
              <article class="dummy" src="img/dummy-9.svg" alt="Dummy" />
              <article class="dummy" src="img/dummy-10.svg" alt="Dummy" />
              <article class="dummy" src="img/dummy-11.svg" alt="Dummy" />
              <article class="dummy" src="img/dummy-12.svg" alt="Dummy" />
              <article class="dummy" src="img/dummy-13.svg" alt="Dummy" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
